- name: Ensure XDG python config directory for startup script exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/python" # Should be created by xdg role, but good to ensure
    state: directory
    mode: '0755'

- name: Check if PYTHONSTARTUP script exists in XDG location
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/python/startup.py"
  register: xdg_python_startup_script_stat

- name: "Guidance: PYTHONSTARTUP XDG path"
  ansible.builtin.debug:
    msg: |
      The PYTHONSTARTUP environment variable is set by the 'xdg' role to point to:
      '{{ xdg_config_home }}/python/startup.py'.
      If you wish to use a Python startup script, ensure it is located (or symlinked) there.
      For example, you could symlink it from your dotfiles:
      ln -s /path/to/your/dotfiles/python/startup.py {{ xdg_config_home }}/python/startup.py
  when: not xdg_python_startup_script_stat.stat.exists
