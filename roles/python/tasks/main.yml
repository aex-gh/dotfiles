- name: Import macOS tasks for Python # name[missing]
  ansible.builtin.import_tasks: mac.yml
  when: ansible_os_family == "Darwin"

- name: Ensure XDG pip config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/pip" # Should be created by xdg role, but good to ensure
    state: directory
    mode: '0755'

- name: Check if actual pip.conf file exists in XDG location
  ansible.builtin.stat:
    path: "{{ xdg_config_home }}/pip/pip.conf"
  register: xdg_pip_config_stat

- name: "Placeholder: pip.conf XDG path guidance"
  ansible.builtin.debug:
    msg: |
      This role expects your pip configuration file (pip.conf)
      to be located at '{{ xdg_config_home }}/pip/pip.conf'.
      You might symlink it from your dotfiles repository into that location,
      or manage it directly with Ansible.
      The PIP_CONFIG_FILE environment variable has been set to point here.
  when: not xdg_pip_config_stat.stat.exists

