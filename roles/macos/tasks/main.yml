---
# tasks file for roles/macos
# Recommended macOS specific settings

- name: "macOS | Set computer name (if hostname_short is defined)"
  ansible.builtin.osx_defaults:
    domain: /Library/Preferences/SystemConfiguration/com.apple.smb.server
    key: NetBIOSName
    type: string
    value: "{{ hostname_short }}"
  when: hostname_short is defined
  become: true # Requires sudo
  notify: # Example handler, not defined in this subtask
    - restart_smbd 

# --- Dock Settings ---
- name: "macOS | Dock | Automatically hide and show the Dock"
  ansible.builtin.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: true

- name: "macOS | Dock | Set icon size"
  ansible.builtin.osx_defaults:
    domain: com.apple.dock
    key: tilesize
    type: int
    value: 36

- name: "macOS | Dock | Enable magnification"
  ansible.builtin.osx_defaults:
    domain: com.apple.dock
    key: magnification
    type: bool
    value: true

- name: "macOS | Dock | Set magnification icon size"
  ansible.builtin.osx_defaults:
    domain: com.apple.dock
    key: largesize
    type: int
    value: 72

- name: "macOS | Dock | Minimize windows into application icon"
  ansible.builtin.osx_defaults:
    domain: com.apple.dock
    key: minimize-to-application
    type: bool
    value: true

# --- Finder Settings ---
- name: "macOS | Finder | Show hidden files"
  ansible.builtin.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true

- name: "macOS | Finder | Show all filename extensions"
  ansible.builtin.osx_defaults:
    domain: NSGlobalDomain # Global domain for this setting
    key: AppleShowAllExtensions
    type: bool
    value: true

- name: "macOS | Finder | Show path bar"
  ansible.builtin.osx_defaults:
    domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: true

- name: "macOS | Finder | When performing a search, search the current folder by default"
  ansible.builtin.osx_defaults:
    domain: com.apple.finder
    key: FXDefaultSearchScope
    type: string
    value: "SCcf"

- name: "macOS | Finder | Avoid creating .DS_Store files on network volumes"
  ansible.builtin.osx_defaults:
    domain: com.apple.desktopservices
    key: DSDontWriteNetworkStores
    type: bool
    value: true

# --- Keyboard Settings ---
- name: "macOS | Keyboard | Set a fast key repeat rate"
  ansible.builtin.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: 2 # Normal minimum is 2 (30 ms)

- name: "macOS | Keyboard | Set a shorter delay until repeat"
  ansible.builtin.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: 15 # Normal minimum is 15 (225 ms)

# --- Screen / Power Settings ---
# Note: Power settings can be complex and might require different domains/keys depending on macOS version
# and whether it's a desktop or laptop. These are examples.

- name: "macOS | Screen | Require password immediately after sleep or screen saver begins"
  ansible.builtin.osx_defaults:
    domain: com.apple.screensaver
    key: askForPassword
    type: int
    value: 1

- name: "macOS | Screen | Set delay before asking for password to 0 seconds"
  ansible.builtin.osx_defaults:
    domain: com.apple.screensaver
    key: askForPasswordDelay
    type: int
    value: 0

# --- Apply changes to affected applications ---
# Some settings require the affected application to be restarted.
# This is often done by killing the process. Use with caution.
- name: "macOS | Restart Dock to apply settings"
  ansible.builtin.command: killall Dock
  changed_when: false # This command itself doesn't indicate a change in state of a resource
  ignore_errors: true # In case Dock isn't running or if it causes issues

- name: "macOS | Restart Finder to apply settings"
  ansible.builtin.command: killall Finder
  changed_when: false
  ignore_errors: true
    
# Add a placeholder for a handler for smbd if NetBIOSName was changed
# This handler would need to be defined in roles/macos/handlers/main.yml
