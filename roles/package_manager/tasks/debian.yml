---
- name: Update package cache (Debian)
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes
  when: package_update | default(true)

- name: Upgrade packages (Debian)
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  become: yes
  when: package_upgrade | default(false)
