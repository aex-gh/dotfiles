---
- name: Install standard development tools (Ubuntu)
  apt:
    name:
      - git
      - vim
      - zsh
      - build-essential
      - curl
      - wget
    state: present
  become: yes

- name: Install modern CLI tools (Ubuntu)
  apt:
    name:
      - ripgrep
      - fd-find
      - bat
      - fzf
    state: present
  become: yes
  ignore_errors: yes  # Some might not be available on older versions

- name: Install eza (Ubuntu - special handling)
  block:
    - name: Create keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      become: yes
      
    - name: Add eza GPG key
      get_url:
        url: https://raw.githubusercontent.com/eza-community/eza/main/deb.asc
        dest: /tmp/eza.asc
      become: yes
      
    - name: Import eza GPG key
      shell: gpg --dearmor < /tmp/eza.asc > /etc/apt/keyrings/gierens.gpg
      become: yes
      args:
        creates: /etc/apt/keyrings/gierens.gpg
      
    - name: Add eza repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/gierens.gpg] http://deb.gierens.de stable main"
        state: present
      become: yes
      
    - name: Install eza
      apt:
        name: eza
        state: present
        update_cache: yes
      become: yes
  rescue:
    - name: Install eza via cargo as fallback
      shell: cargo install eza
      args:
        creates: "{{ ansible_env.HOME }}/.cargo/bin/eza"
      when: "'cargo' in ansible_facts.packages"
