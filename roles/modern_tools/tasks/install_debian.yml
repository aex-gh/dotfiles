---
- name: Install development tools (Debian) # No packages left after removing overlap
  ansible.builtin.apt:
    name: []
    state: present
  become: true
  # ignore_errors: true # Removed

- name: Install rust for cargo installations
  ansible.builtin.shell: "set -o pipefail && curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y" # risky-shell-pipe addressed, command-instead-of-module may persist
  args:
    creates: "{{ xdg_data_home }}/cargo/bin/cargo"
  changed_when: false
# eza installation for Debian is now handled in special_installs.yml
