---
# Modern CLI tools installation across platforms
- name: Determine current platform
  ansible.builtin.set_fact:
    current_platform: "{{ ansible_distribution if ansible_distribution in (supported_platforms.primary + supported_platforms.secondary) else ansible_os_family }}"

- name: Check platform support
  ansible.builtin.fail:
    msg: |
      Platform {{ current_platform }} is not supported.
      Supported: {{ (supported_platforms.primary + supported_platforms.secondary) | join(', ') }}
  when: current_platform not in (supported_platforms.primary + supported_platforms.secondary)

- name: Install core development tools
  ansible.builtin.include_tasks: "install_{{ current_platform | lower }}.yml"

- name: Handle special installations
  ansible.builtin.include_tasks: "special_installs.yml"
