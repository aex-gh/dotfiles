---
# XDG Base Directory Specification compliance
- name: Set XDG environment variables
  ansible.builtin.blockinfile: # FQCN
    path: "{{ ansible_env.HOME }}/.zshenv"
    create: true # Truthy
    mode: '0644' # risky-file-permissions
    block: |
      # XDG Base Directory Specification
      export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$HOME/.config}"
      export XDG_DATA_HOME="${XDG_DATA_HOME:-$HOME/.local/share}"
      export XDG_CACHE_HOME="${XDG_CACHE_HOME:-$HOME/.cache}"
      export XDG_STATE_HOME="${XDG_STATE_HOME:-$HOME/.local/state}"
      
      # Application-specific XDG compliance
      export VIMINIT='let $MYVIMRC = !has("nvim") ? "$XDG_CONFIG_HOME/vim/vimrc" : "$XDG_CONFIG_HOME/nvim/init.lua" | so $MYVIMRC'
      export ZDOTDIR="$XDG_CONFIG_HOME/zsh"
      export HISTFILE="$XDG_STATE_HOME/zsh/history"
      export LESSHISTFILE="$XDG_CACHE_HOME/less/history"
      export CARGO_HOME="$XDG_DATA_HOME/cargo"
      export RUSTUP_HOME="$XDG_DATA_HOME/rustup"
      export NODE_REPL_HISTORY="$XDG_DATA_HOME/node_repl_history"
      export NPM_CONFIG_USERCONFIG="$XDG_CONFIG_HOME/npm/npmrc"
      export DOCKER_CONFIG="$XDG_CONFIG_HOME/docker"
      export PIP_CONFIG_FILE="${XDG_CONFIG_HOME:-$HOME/.config}/pip/pip.conf"
      export MISE_CONFIG_DIR="${XDG_CONFIG_HOME:-$HOME/.config}/mise"
      export MISE_DATA_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/mise"
      export MISE_CACHE_DIR="${XDG_CACHE_HOME:-$HOME/.cache}/mise"
      export PYTHONSTARTUP="${XDG_CONFIG_HOME:-$HOME/.config}/python/startup.py"
    marker: "# {mark} ANSIBLE MANAGED XDG BLOCK"

- name: Create XDG directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_env.HOME }}/.config"
    - "{{ ansible_env.HOME }}/.local/share"
    - "{{ ansible_env.HOME }}/.cache"
    - "{{ ansible_env.HOME }}/.local/state"
    - "{{ ansible_env.HOME }}/.local/bin"
    - "{{ ansible_env.HOME }}/.config/zsh"
    - "{{ ansible_env.HOME }}/.config/vim"
    - "{{ ansible_env.HOME }}/.local/state/zsh"
    - "{{ ansible_env.HOME }}/.config/git"
    - "{{ ansible_env.HOME }}/.config/npm"
    - "{{ ansible_env.HOME }}/.cache/less"
    - "{{ xdg_config_home | default(ansible_env.HOME + '/.config') }}/docker"
    - "{{ xdg_config_home | default(ansible_env.HOME + '/.config') }}/python" # Added python startup dir

- name: Create vim autoload directory (XDG compliant)
  ansible.builtin.file: # FQCN
    path: "{{ xdg_data_home | default(ansible_env.HOME + '/.local/share') }}/vim/autoload" # Corrected path
    state: directory
    mode: '0755'
