---
- name: Install font packages (Ubuntu)
  apt:
    name:
      - fonts-hack
      - fonts-firacode
      - fonts-jetbrains-mono
      - fonts-noto
      - fonts-noto-color-emoji
    state: present
  become: yes

- name: Create local fonts directory
  file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts"
    state: directory
    mode: '0755'

- name: Update font cache
  shell: fc-cache -fv
