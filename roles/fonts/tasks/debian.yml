---
- name: Install font packages (Debian)
  apt:
    name:
      - fonts-hack
      - fonts-firacode
      - fonts-jetbrains-mono
      - fonts-noto
      - fonts-noto-color-emoji
    state: present
  become: yes
  ignore_errors: yes  # Some fonts might not be available on older versions

- name: Create local fonts directory
  file:
    path: "{{ ansible_env.HOME }}/.local/share/fonts"
    state: directory
    mode: '0755'

- name: Download JetBrains Mono font (fallback)
  get_url:
    url: "https://github.com/JetBrains/JetBrainsMono/raw/master/fonts/ttf/JetBrainsMono-Regular.ttf"
    dest: "{{ ansible_env.HOME }}/.local/share/fonts/JetBrainsMono-Regular.ttf"
    mode: '0644'
  when: ansible_distribution_version is version('11', '<')

- name: Update font cache
  shell: fc-cache -fv
