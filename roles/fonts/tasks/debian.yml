---
- name: Install font packages (Debian)
  ansible.builtin.apt:
    name: "{{ item.value.Debian }}"
    state: present
  loop: "{{ font_packages | dict2items }}"
  when: item.value.Debian is defined and item.value.Debian is not none
  become: true

- name: Create local fonts directory
  ansible.builtin.file:
    path: "{{ xdg_data_home }}/fonts"
    state: directory
    mode: '0755'

- name: Download JetBrains Mono font (fallback)
  ansible.builtin.get_url:
    url: "https://github.com/JetBrains/JetBrainsMono/raw/master/fonts/ttf/JetBrainsMono-Regular.ttf"
    dest: "{{ xdg_data_home }}/fonts/JetBrainsMono-Regular.ttf"
    mode: '0644'
  when: ansible_distribution_version is version('11', '<')

- name: Update font cache
  ansible.builtin.command: fc-cache -fv
  become: false # Fonts installed to user's XDG directory
  changed_when: false
  check_mode: false
